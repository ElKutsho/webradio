<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0a0a0f"/>
  <!-- Radio body - cyan outline -->
  <rect x="10" y="22" width="44" height="32" rx="4" fill="none" stroke="#00e5ff" stroke-width="2.5" filter="url(#glow-cyan)"/>
  <!-- Speaker grille circle -->
  <circle cx="28" cy="38" r="10" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow-cyan)"/>
  <!-- Speaker lines -->
  <line x1="20" y1="34" x2="36" y2="34" stroke="#00e5ff" stroke-width="1.2" opacity="0.7"/>
  <line x1="19" y1="37" x2="37" y2="37" stroke="#00e5ff" stroke-width="1.2" opacity="0.7"/>
  <line x1="19" y1="40" x2="37" y2="40" stroke="#00e5ff" stroke-width="1.2" opacity="0.7"/>
  <line x1="20" y1="43" x2="36" y2="43" stroke="#00e5ff" stroke-width="1.2" opacity="0.7"/>
  <!-- Knobs - magenta -->
  <circle cx="47" cy="32" r="3" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#glow-magenta)"/>
  <circle cx="47" cy="41" r="2.5" fill="none" stroke="#ff00ff" stroke-width="1.8" filter="url(#glow-magenta)"/>
  <circle cx="47" cy="48" r="2" fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#glow-magenta)"/>
  <!-- Antenna -->
  <line x1="44" y1="22" x2="52" y2="8" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-magenta)"/>
  <circle cx="52" cy="8" r="2.5" fill="#00e5ff" filter="url(#glow-cyan)"/>
</svg>
